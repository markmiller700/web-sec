<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Security Lab</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #f5f5f5; font-family: Arial, sans-serif;
  }
  .card {
    width: 300px; background: #fff;
    border: 1px solid #e0e0e0; border-radius: 8px;
    padding: 2rem 1.75rem 1.5rem;
  }
  h2 { font-size: 18px; font-weight: 600; color: #111; text-align: center; margin-bottom: 6px; }
  .sub { font-size: 12px; color: #888; text-align: center; margin-bottom: 1.75rem; }
  .field { margin-bottom: 12px; position: relative; }
  .field svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 15px; height: 15px; stroke: #bbb; fill: none;
    stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; pointer-events: none;
  }
  input {
    width: 100%; padding: 9px 11px 9px 33px;
    border: 1px solid #e0e0e0; border-radius: 6px;
    background: #fafafa; color: #111; font-size: 13px; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus { border-color: #111; background: #fff; box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
  input::placeholder { color: #bbb; }
  .btn {
    width: 100%; padding: 9px; border: none; border-radius: 6px;
    background: #111; color: #fff; font-size: 13px; font-weight: 500;
    cursor: pointer; margin-top: 6px; transition: background 0.15s;
  }
  .btn:hover { background: #333; }
  .footer { display: flex; align-items: center; gap: 6px; justify-content: center; margin-top: 1.25rem; }
  .footer svg { width: 12px; height: 12px; stroke: #ccc; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .footer span { font-size: 11px; color: #ccc; }
</style>
</head>
<body>
<div class="card">
  <h2>Gitex </h2>
  <p class="sub">Authorized access only</p>
  <div class="field">
    <svg viewBox="0 0 16 16"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6"/></svg>
    <input type="text" id="user" placeholder="Username" />
  </div>
  <div class="field">
    <svg viewBox="0 0 16 16"><rect x="3" y="7" width="10" height="7" rx="1.5"/><path d="M5 7V5a3 3 0 0 1 6 0v2"/></svg>
    <input type="password" id="pass" placeholder="Password" />
  </div>
  <button class="btn" onclick="login()">Login</button>
  <div class="footer">
  </div>
</div>
</body>
</html>
