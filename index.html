<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>web security</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #e5e7eb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .login-box {
        background: #f3f4f6;
        padding: 35px 18px;
        border-radius: 5px;
        width: 260px;
        box-shadow: 0 0 10px rgba(0,0,0,0.08);
    }

    h1 {
        text-align: center;
        font-size: 18px;
        margin-bottom: 5px;
        color: #333;
    }

    .subtitle {
        text-align: center;
        font-size: 11px;
        color: #6b7280;
        margin-bottom: 20px;
    }

    .input-group {
        position: relative;
        margin-bottom: 15px;
    }

    .input-group input {
        width: 75%;
        padding: 10px 10px 10px 35px;
        border: 1px solid #d1d5db;
        border-radius: 5px;
        background: #e5e7eb;
        outline: none;
        font-size: 14px;
        transition: 0.2s;
    }

    .input-group input:focus {
        border-color: #6366f1;
        background: #fff;
    }

    button {
        width: 93%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(to right, #6366f1, #4f46e5);
        color: white;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        opacity: 0.9;
    }

    .status {
        margin-top: 12px;
        font-size: 11px;
        color: #6b7280;
        text-align: center;
    }
</style>
</head>

<body>

<div class="login-box">
    <h1>Web Security Lab</h1>
    <div class="subtitle">authorized access only</div>

    <div class="input-group">
        <input type="text" id="user" placeholder="Username">
    </div>

    <div class="input-group">
        <input type="password" id="pass" placeholder="Password">
    </div>

    <button onclick="login()">Login</button>

 
</div>


</body>
</html>
